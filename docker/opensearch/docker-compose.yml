services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: uk-opensearch
    environment:
      - cluster.name=uk-cluster
      - node.name=uk-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: uk-embeddings
    command: --model-id sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2 --port 80
    environment:
      - HF_XET_HIGH_PERFORMANCE=1
      - HUGGINGFACE_HUB_CACHE=/data/hub
    ports:
      - "8080:80"
    volumes:
      - ./.cache:/data
    restart: on-failure:5
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:80/health || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 60
      start_period: 600s

volumes:
  opensearch-data:
